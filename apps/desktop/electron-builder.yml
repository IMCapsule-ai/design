appId: ai.imcapsule.palette-design
productName: Palette Design
publish:
  - provider: github
    owner: IMCapsule-ai
    repo: design
directories:
  buildResources: resources
  output: release
files:
  - out/**
  - package.json
asar: true
mac:
  category: public.app-category.graphics-design
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false
  artifactName: palette-design-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch: [arm64]
dmg:
  background: build/dmg-background.png
  iconSize: 92
  window:
    width: 640
    height: 480
  contents:
    - x: 140
      y: 240
      type: file
    - x: 500
      y: 240
      type: link
      path: /Applications
win:
  icon: resources/icon.ico
  artifactName: palette-design-${version}-${arch}-setup.${ext}
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
linux:
  icon: resources/icon.png
  executableName: palette-design
  maintainer: Palette Design Maintainers <hello@palettedesign.app>
  vendor: IMCapsule-ai
  synopsis: Prompt-to-design desktop app for HTML prototypes, decks, and marketing assets
  description: Palette Design turns natural-language prompts into interactive HTML prototypes, PDF-ready slide decks, and marketing assets. Runs on your laptop with local-first storage.
  artifactName: palette-design-${version}-x64.${ext}
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  category: Graphics
snap:
  grade: stable
  confinement: strict
  summary: Prompt → polished HTML prototypes, slide decks, and marketing assets.
deb:
  fpm:
    - "--name"
    - "palette-design"
rpm:
  fpm:
    - "--name"
    - "palette-design"
